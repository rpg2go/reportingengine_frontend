<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Reporting Engine</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Reporting Engine — spreadsheet-first analytics and report builder.">

  <!-- Fonts: Inter (body) + Geist fallback via Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- Inline theme init — prevents flash of wrong theme. Default: LIGHT -->
  <script>
    (function() {
      try {
        var t = localStorage.getItem('re-theme');
        if (t === 'dark') {
          // user explicitly chose dark — keep no class (dark is base)
          document.documentElement.classList.remove('light');
        } else {
          // default and 'light' both add the class
          document.documentElement.classList.add('light');
        }
      } catch(e) {
        document.documentElement.classList.add('light');
      }
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
