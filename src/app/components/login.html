<div class="login-container">
  <!-- Ambient glow blobs -->
  <div class="glow-blob glow-top-left"></div>
  <div class="glow-blob glow-bottom-right"></div>

  <div class="glass-card animate-fade-in">
    <!-- Logo + Title -->
    <div class="header-logo">
      <div class="logo-circle">
        <!-- Bar chart SVG icon -->
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none"
             stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6"  y1="20" x2="6"  y2="14"/>
        </svg>
      </div>
      <h1 class="text-gradient">Reporting Engine</h1>
      <p class="subtitle">Secure Analytics Gateway</p>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form">
      <!-- Username field -->
      <div class="form-group">
        <label for="username" class="field-label">Identity</label>
        <div class="relative flex items-center w-full input-glow">
          <span class="absolute left-3.5 pointer-events-none text-slate-400 z-10 flex items-center justify-center">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </span>
          <input
            type="text"
            id="username"
            name="username"
            class="w-full pl-10 pr-4 py-3.5 bg-[#1e293b] border border-white/10 rounded-xl text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 focus:bg-[#0f172a] transition-all duration-200"
            [(ngModel)]="username"
            required
            autocomplete="username"
            placeholder="Enter username"
            #usernameInput="ngModel"
          />
        </div>
      </div>

      <!-- Password field -->
      <div class="form-group">
        <label for="password" class="field-label">Security Key</label>
        <div class="relative flex items-center w-full input-glow">
          <span class="absolute left-3.5 pointer-events-none text-slate-400 z-10 flex items-center justify-center">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input
            type="password"
            id="password"
            name="password"
            class="w-full pl-10 pr-4 py-3.5 bg-[#1e293b] border border-white/10 rounded-xl text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 focus:bg-[#0f172a] transition-all duration-200"
            [(ngModel)]="password"
            required
            autocomplete="current-password"
            placeholder="••••••••"
            #passwordInput="ngModel"
          />
        </div>
      </div>

      <!-- Error message -->
      @if (errorMessage()) {
        <div class="alert alert-error animate-fade-in flex items-center gap-2 p-3 bg-red-950/30 border border-red-500/25 rounded-xl text-red-400 text-sm" role="alert">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span>{{ errorMessage() }}</span>
        </div>
      }

      <!-- Submit button -->
      <button
        type="submit"
        class="w-full py-3.5 px-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white rounded-xl font-semibold shadow-lg shadow-blue-500/25 hover:shadow-blue-500/35 focus:outline-none focus:ring-2 focus:ring-blue-500/50 active:scale-[0.98] transition-all duration-200 disabled:opacity-50 disabled:pointer-events-none flex items-center justify-center gap-2"
        [disabled]="loading() || !loginForm.valid"
        [attr.aria-busy]="loading()"
      >
        @if (loading()) {
          <span class="spinner"></span>
          <span>Verifying...</span>
        } @else {
          <span>Enter Portal</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        }
      </button>
    </form>

    <!-- Footer -->
    <div class="login-footer mt-6 text-center text-xs text-slate-500">
      <div class="footer-powered flex items-center justify-center gap-1.5 mb-1 text-slate-400">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-amber-500">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
        <span>Powered by Intelligent Orchestration</span>
      </div>
      <p class="footer-copy">© 2026 Reporting Engine Platform</p>
    </div>
  </div>
</div>
