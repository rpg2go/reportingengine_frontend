<div 
  class="relative p-4 border bg-white shadow-sm rounded-xl my-2 border-l-4 pl-7 transition-all duration-200"
  [class.border-l-indigo-600]="depth() % 4 === 0"
  [class.border-l-emerald-600]="depth() % 4 === 1"
  [class.border-l-amber-500]="depth() % 4 === 2"
  [class.border-l-rose-500]="depth() % 4 === 3"
>
  <!-- Opening Parenthesis Marker -->
  <span 
    class="absolute left-2 top-3 text-sm font-black select-none pointer-events-none"
    [ngClass]="getDepthColorClass(depth())"
  >
    (
  </span>
  <!-- Minimal Header Toolbar Row -->
  <div class="flex items-center justify-between pb-3 mb-3 border-b border-slate-100">
    <!-- AND / OR Toggle Choices -->
    <div class="inline-flex rounded-lg p-0.5 bg-slate-100 text-xs font-semibold border border-slate-200/50">
      <button 
        type="button"
        (click)="setOperator('AND')"
        class="px-3 py-1 rounded-md transition-all duration-150 cursor-pointer"
        [class.bg-white]="group().logicalOperator === 'AND'"
        [class.text-indigo-600]="group().logicalOperator === 'AND'"
        [class.shadow-sm]="group().logicalOperator === 'AND'"
        [class.text-slate-500]="group().logicalOperator !== 'AND'"
      >
        AND
      </button>
      <button 
        type="button"
        (click)="setOperator('OR')"
        class="px-3 py-1 rounded-md transition-all duration-150 cursor-pointer"
        [class.bg-white]="group().logicalOperator === 'OR'"
        [class.text-amber-600]="group().logicalOperator === 'OR'"
        [class.shadow-sm]="group().logicalOperator === 'OR'"
        [class.text-slate-500]="group().logicalOperator !== 'OR'"
      >
        OR
      </button>
    </div>

    <!-- Right-aligned Actions -->
    <div class="flex items-center gap-4 text-xs">
      <button 
        type="button" 
        (click)="addCondition()"
        class="text-indigo-600 hover:text-indigo-800 font-semibold transition-colors cursor-pointer flex items-center gap-1"
      >
        <span class="text-sm">+</span> Condition
      </button>
      <button 
        type="button" 
        (click)="addSubGroup()"
        class="text-indigo-600 hover:text-indigo-800 font-semibold transition-colors cursor-pointer flex items-center gap-1"
      >
        <span class="text-sm">+</span> Sub-Group
      </button>
      @if (parentGroup()) {
        <button 
          type="button" 
          (click)="removeSelf()"
          class="text-slate-400 hover:text-rose-500 font-semibold transition-colors cursor-pointer flex items-center gap-1 hover:bg-rose-50 px-2 py-1 rounded-md"
        >
          ✕ Remove Group
        </button>
      }
    </div>
  </div>

  <!-- Rules List -->
  @if (group().rules && group().rules.length > 0) {
    <div class="flex flex-col gap-2.5 mb-3">
      @for (rule of group().rules; track $index; let ri = $index) {
        <div class="flex items-center gap-2.5 bg-slate-50/60 p-2 rounded-xl border border-slate-100/50">
          <!-- Table Selection -->
          <select 
            [(ngModel)]="rule.tableName" 
            (change)="onTableChange(rule)"
            class="text-xs bg-white border border-slate-200 rounded-lg px-2.5 py-1.5 max-w-[130px] focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500"
          >
            <option [value]="''">{{ activeMeasureTable().replace('analytics.', '') }} (Fact)</option>
            @for (dim of linkedDimensions(); track dim) {
              <option [value]="dim">{{ dim }}</option>
            }
          </select>

          <!-- Column Selection -->
          <select 
            [(ngModel)]="rule.columnName" 
            (change)="onColumnChange(rule)"
            class="text-xs bg-white border border-slate-200 rounded-lg px-2.5 py-1.5 max-w-[130px] focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500"
          >
            <option value="">-- column --</option>
            @for (col of getAvailableColumns(rule.tableName); track col) {
              <option [value]="col">{{ col }}</option>
            }
          </select>

          <!-- Operator Selection -->
          <select 
            [(ngModel)]="rule.operator" 
            (change)="onRuleChange(); onOperatorChange(rule)"
            class="text-xs bg-white border border-slate-200 rounded-lg px-2.5 py-1.5 max-w-[160px] focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500"
          >
            @for (op of operators; track op.value) {
              <option [value]="op.value">{{ op.label }}</option>
            }
          </select>

          <!-- Value Picker -->
          @if (rule.requiresValueField) {
            <div class="flex-grow min-w-[200px]">
              <app-value-picker
                [availableValues]="getRuleDistinctValues(rule)"
                [selectedValues]="rule.value"
                (selectedValuesChange)="onRuleValuesChange(rule, $event)"
                [placeholder]="'Select values...'"
              ></app-value-picker>
            </div>
          }

          <!-- Remove Rule Button -->
          <button 
            type="button"
            (click)="removeRule(ri)" 
            class="ml-auto text-slate-400 hover:text-rose-500 hover:bg-rose-50 transition-colors p-1.5 rounded-lg cursor-pointer flex items-center justify-center"
            title="Remove Condition"
          >
            ✕
          </button>
        </div>
      }
    </div>
  }

  <!-- Nested Child Groups (Recursive) -->
  @if (group().childGroups && group().childGroups.length > 0) {
    <div class="pl-5 border-l-2 border-slate-100 flex flex-col gap-3 mt-3">
      @for (child of group().childGroups; track child.id) {
        <app-row-condition-group
          [group]="child"
          [parentGroup]="group()"
          [depth]="depth() + 1"
          [activeMeasureTable]="activeMeasureTable()"
          [dwhCatalog]="dwhCatalog()"
          [linkedDimensions]="linkedDimensions()"
          [columnTypes]="columnTypes()"
          (removeGroup)="onRemoveChildGroup($event)"
          (groupChanged)="onChildGroupChanged()"
        ></app-row-condition-group>
      }
    </div>
  }

  <!-- Closing Parenthesis Marker -->
  <span 
    class="absolute right-3 bottom-3 text-sm font-black select-none pointer-events-none"
    [ngClass]="getDepthColorClass(depth())"
  >
    )
  </span>
</div>
