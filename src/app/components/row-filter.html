<div class="row-filter-wrapper">
  <!-- Structured filter chips -->
  <div class="filter-chips-mini">
    @for (f of rowFilters(); track $index; let fi = $index) {
      <span class="filter-tag-mini" [class.invalid-filter-tag]="isFilterValueInvalid(f)">
        @if (f.dimTable) {
          <span class="ft-dim">{{ f.dimTable }}.</span>
        }
        <span class="ft-attr">{{ f.attribute }}</span>
        <span class="ft-op">{{ getOperatorLabel(f.operator) }}</span>
        <span class="ft-val">{{ f.value }}</span>
        <button (click)="removeFilter(fi, $event)" class="ft-remove" aria-label="Remove filter condition">✕</button>
      </span>
    }
  </div>

  @if (isOpen()) {
    <div class="row-filter-builder" (click)="$event.stopPropagation()">
      <div class="rfb-fields-grid">
        <!-- Table selector -->
        <div class="rfb-label-row">
          <label for="rfb-table-comp-select">Filter Table</label>
          <select
            id="rfb-table-comp-select"
            [ngModel]="pendingFilter().dimTable"
            (ngModelChange)="pendingFilter.set({ ...pendingFilter(), dimTable: $event }); onTableChange()"
            class="form-select"
          >
            @if (activeMeasureTable()) {
              <option [value]="''">{{ activeMeasureTable().replace('analytics.', '') }} (Fact)</option>
            } @else {
              <option value="">Fact Table</option>
            }
            @for (dim of linkedDimensions(); track dim) {
              <option [value]="dim">{{ dim }}</option>
            }
          </select>
        </div>

        <!-- Column selector -->
        <div class="rfb-label-row">
          <label for="rfb-attr-comp-select">Column</label>
          <select
            id="rfb-attr-comp-select"
            [ngModel]="pendingFilter().attribute"
            (ngModelChange)="pendingFilter.set({ ...pendingFilter(), attribute: $event }); onAttrChange()"
            class="form-select"
          >
            <option value="">-- column --</option>
            @for (col of availableColumns(); track col) {
              <option [value]="col">{{ col }}</option>
            }
          </select>
        </div>

        <!-- Operator -->
        <div class="rfb-label-row">
          <label for="rfb-op-comp-select">Operator</label>
          <select
            id="rfb-op-comp-select"
            [ngModel]="pendingFilter().operator"
            (ngModelChange)="pendingFilter.set({ ...pendingFilter(), operator: $event })"
            class="form-select"
          >
            @for (op of operators; track op.value) {
              <option [value]="op.value">{{ op.label }}</option>
            }
          </select>
        </div>

        <!-- Value selection using custom combobox -->
        <div class="rfb-label-row">
          <label>Value</label>
          <app-value-picker
            [availableValues]="pendingFilterValues()"
            [selectedValues]="pendingFilterValuesSelected()"
            (selectedValuesChange)="onSelectedValuesChange($event)"
            [placeholder]="'Select values...'"
            [class.invalid-input]="isFilterValueInvalid(pendingFilter())"
            [title]="isFilterValueInvalid(pendingFilter()) ? 'Value does not match the column type' : ''"
          ></app-value-picker>
        </div>
      </div>

      <div class="rfb-actions">
        <button 
          (click)="confirmFilter()" 
          [disabled]="!pendingFilter().attribute" 
          class="rfb-confirm-btn"
        >
          ✓ Add Condition
        </button>
        <button (click)="close()" class="rfb-cancel-btn">Cancel</button>
      </div>
    </div>
  } @else {
    <button 
      (click)="$event.stopPropagation(); openBuilder()" 
      class="add-row-filter-btn" 
      [disabled]="!activeMeasureTable()"
    >
      + Add Condition
    </button>
  }
</div>
