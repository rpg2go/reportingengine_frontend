<div class="row-filter-wrapper">
  <!-- Structured filter summary or Raw SQL editor -->
  <div class="filter-chips-mini">
    @if (isRawMode()) {
      <div class="raw-expression-display" (click)="$event.stopPropagation()">
        <span class="raw-expression-badge font-mono">SQL</span>
        <input 
          type="text" 
          [ngModel]="legacyFilterExpr()" 
          (ngModelChange)="onRawExpressionChange($event)" 
          placeholder="e.g. (a = 2 OR b = 3) AND c = 'AMZN'"
          class="form-input raw-expression-input text-xs"
        />
        <button (click)="switchToStructuredMode()" class="switch-mode-btn" title="Switch to structured builder">
          Builder
        </button>
      </div>
    } @else {
      @if (rowFilters()) {
        <span 
          class="filter-tag-mini cursor-pointer truncate max-w-[280px] font-mono text-xs text-indigo-600 bg-indigo-50 border border-indigo-100 rounded-md px-2 py-0.5" 
          [title]="getFilterStringSummary(rowFilters())"
          (click)="$event.stopPropagation(); openBuilder()"
        >
          {{ getFilterStringSummary(rowFilters()) }}
        </span>
      } @else {
        <span class="text-xs text-slate-400 italic">No filters</span>
      }
      
      @if (rowFilters()) {
        <button (click)="switchToRawMode()" class="switch-mode-btn" title="Convert to Custom SQL">
          SQL Mode
        </button>
      }
    }
  </div>

  @if (isOpen()) {
    <div class="row-filter-builder" (click)="$event.stopPropagation()">
      <div class="text-xs font-semibold text-slate-800 mb-2 border-b border-slate-200 pb-1.5 flex justify-between items-center">
        <span>Query Filter Builder</span>
        <span class="text-[10px] text-slate-400 font-normal">Nested parenthetical builder</span>
      </div>

      <div class="max-h-[380px] overflow-y-auto pr-1">
        @if (rowFilters()) {
          <app-row-condition-group
            [group]="rowFilters()!"
            [parentGroup]="null"
            [activeMeasureTable]="activeMeasureTable()"
            [dwhCatalog]="dwhCatalog()"
            [linkedDimensions]="linkedDimensions()"
            [columnTypes]="columnTypes()"
            (groupChanged)="onGroupChanged()"
          ></app-row-condition-group>
        }
      </div>

      <div class="rfb-actions">
        <button (click)="close()" class="rfb-confirm-btn">✓ Save & Close</button>
      </div>
    </div>
  } @else {
    <div style="display: flex; align-items: center; gap: 8px;">
      <button 
        (click)="$event.stopPropagation(); openBuilder()" 
        class="add-row-filter-btn" 
        [disabled]="!activeMeasureTable() || isRawMode()"
      >
        + Edit Filters
      </button>
      @if (!isRawMode() && !rowFilters()) {
        <button (click)="switchToRawMode()" class="switch-mode-btn">
          + Custom SQL
        </button>
      }
    </div>
  }
</div>
